<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Tani Catat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:sans-serif;background:#eef4e8;min-height:100vh;padding-bottom:72px;font-size:15px}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1e4d0a,#3a7d1a);color:#fff;padding:16px;position:sticky;top:0;z-index:50}
.hdr h1{font-size:20px;font-weight:900}
.hdr p{font-size:12px;opacity:.75;margin-top:2px}

/* TABS */
.tabs{display:flex;background:#1e4d0a}
.tab{flex:1;padding:11px 4px;background:none;border:none;color:rgba(255,255,255,.5);font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent}
.tab.on{color:#f9ca24;border-bottom-color:#f9ca24}

/* PAGES */
.pg{display:none;padding:14px}
.pg.on{display:block}

/* CARD */
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,80,0,.1)}
.ctitle{font-size:11px;font-weight:900;color:#1e6b0a;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}

/* FORM */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fg{margin-bottom:10px}
.fg label{font-size:11px;font-weight:800;color:#2a6010;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 12px;border:2px solid #dde8d5;border-radius:10px;font-size:14px;font-weight:600;background:#f6faf2;color:#1a1a1a;font-family:sans-serif;-webkit-appearance:none;appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#5aad2a;background:#fff}
.fg textarea{resize:none;height:68px}
.fg.full{grid-column:1/-1}

/* TIME ROW */
.trow{display:flex;align-items:center;gap:6px}
.trow input{flex:1}
.nbtn{background:#5aad2a;color:#fff;border:none;border-radius:8px;padding:11px 10px;font-size:11px;font-weight:900;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* BUTTONS */
.btn-save{width:100%;background:linear-gradient(135deg,#5aad2a,#2a7010);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:900;cursor:pointer;margin-top:4px;box-shadow:0 4px 14px rgba(90,173,42,.35)}
.btn-save:active{opacity:.85}
.btn-del{background:#fdecea;color:#c0392b;border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer}
.btn-export{width:100%;background:linear-gradient(135deg,#f9ca24,#e6a817);color:#1a3d00;border:none;border-radius:11px;padding:13px;font-size:14px;font-weight:900;cursor:pointer;margin-bottom:8px}

/* SUMMARY */
.sumgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sumcard{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(0,80,0,.1);text-align:center}
.sumval{font-size:30px;font-weight:900;line-height:1}
.sumlbl{font-size:10px;color:#999;font-weight:800;text-transform:uppercase;margin-top:4px}

/* FILTER CHIPS */
.chips{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:2px solid #ccc;background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:#777}
.chip.on{background:#1e4d0a;border-color:#1e4d0a;color:#fff}

/* RECORD */
.rec{background:#fff;border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(0,80,0,.08);border-left:4px solid #5aad2a;position:relative}
.rec-date{font-size:15px;font-weight:900;color:#1e4d0a}
.rec-day{font-size:12px;color:#aaa;font-weight:600}
.rec-nama{font-size:11px;color:#bbb;font-weight:700;margin-top:2px}
.badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;background:#e8f5e0;color:#1e6b0a}
.rec-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.times{display:flex;gap:14px;align-items:center}
.tc{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;font-family:monospace}
.dot{width:8px;height:8px;border-radius:50%}
.dot.in{background:#5aad2a}
.dot.out{background:#e55039}
.rec-ket{font-size:12px;color:#777;margin-top:6px;font-style:italic}
.rec-del{position:absolute;top:10px;right:10px;background:#fdecea;color:#c0392b;border:none;border-radius:8px;width:30px;height:30px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* PEKERJA */
.pek{background:#fff;border-radius:12px;padding:13px 14px;margin-bottom:8px;box-shadow:0 2px 10px rgba(0,80,0,.08);display:flex;align-items:center;gap:12px}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#5aad2a,#1e4d0a);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:900;flex-shrink:0}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:#bbb}
.empty .ico{font-size:48px;margin-bottom:10px}
.empty p{font-size:14px;font-weight:600}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #e0e8d8;display:flex;z-index:100;box-shadow:0 -3px 16px rgba(0,0,0,.07)}
.bnav button{flex:1;padding:10px 4px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:800;color:#bbb;font-family:sans-serif}
.bnav button.on{color:#2a7010}
.bnav button .ico{font-size:22px}

/* TOAST */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-90px);background:#1e4d0a;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:700;z-index:999;transition:transform .3s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hdr">
  <h1>🌾 Tani Catat</h1>
  <p>Daftar Hadir Tenaga Kerja Pertanian</p>
</div>

<div class="tabs">
  <button class="tab on" onclick="goTab('absen',this)"><span class="ico">✏️</span> Absen</button>
  <button class="tab" onclick="goTab('rekap',this)"><span class="ico">📋</span> Rekap</button>
  <button class="tab" onclick="goTab('pekerja',this)"><span class="ico">👥</span> Pekerja</button>
</div>

<!-- ABSEN -->
<div class="pg on" id="pg-absen">
  <div class="card" style="margin-top:14px">
    <div class="ctitle">📅 Tanggal & Pekerja</div>
    <div class="row2">
      <div class="fg">
        <label>Tanggal</label>
        <input type="date" id="inp-tgl" onchange="autoHari()"/>
      </div>
      <div class="fg">
        <label>Hari</label>
        <input type="text" id="inp-hari" readonly placeholder="Otomatis"/>
      </div>
      <div class="fg full">
        <label>Nama Pekerja</label>
        <select id="inp-nama">
          <option value="">– Pilih Pekerja –</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="ctitle">🕐 Jam Masuk & Keluar</div>
    <div class="row2">
      <div class="fg">
        <label>IN (Masuk)</label>
        <div class="trow">
          <input type="time" id="inp-in"/>
          <button class="nbtn" onclick="setNow('inp-in')">Skrg</button>
        </div>
      </div>
      <div class="fg">
        <label>OUT (Keluar)</label>
        <div class="trow">
          <input type="time" id="inp-out"/>
          <button class="nbtn" onclick="setNow('inp-out')">Skrg</button>
        </div>
      </div>
      <div class="fg full">
        <label>Keterangan / Kegiatan</label>
        <textarea id="inp-ket" placeholder="Contoh: Spray, Bersih rumput, Pupuk NPK..."></textarea>
      </div>
    </div>
    <button class="btn-save" onclick="simpan()">💾 Simpan Absen</button>
  </div>
</div>

<!-- REKAP -->
<div class="pg" id="pg-rekap">
  <div style="height:14px"></div>
  <div class="sumgrid">
    <div class="sumcard"><div class="sumval" id="s-catatan" style="color:#1e4d0a">0</div><div class="sumlbl">Catatan</div></div>
    <div class="sumcard"><div class="sumval" id="s-jam" style="color:#7d5a2f">0j</div><div class="sumlbl">Total Jam</div></div>
  </div>
  <div class="chips" id="chips"></div>
  <div id="list-rekap"></div>
  <div class="card" style="margin-top:4px">
    <div class="ctitle">📤 Export Data</div>
    <button class="btn-export" onclick="exportCSV()">⬇️ Download CSV</button>
    <button class="btn-export" onclick="exportTeks()" style="background:linear-gradient(135deg,#dfe6e9,#b2bec3);color:#2d3436">📄 Salin Teks</button>
  </div>
</div>

<!-- PEKERJA -->
<div class="pg" id="pg-pekerja">
  <div class="card" style="margin-top:14px">
    <div class="ctitle">➕ Tambah Pekerja</div>
    <div class="fg">
      <label>Nama Pekerja</label>
      <input type="text" id="pek-nama" placeholder="Masukkan nama lengkap..."/>
    </div>
    <div class="fg">
      <label>Jabatan / Posisi</label>
      <input type="text" id="pek-posisi" placeholder="Contoh: Buruh Harian, Mandor..."/>
    </div>
    <button class="btn-save" onclick="tambahPekerja()">➕ Tambah Pekerja</button>
  </div>
  <div id="list-pekerja"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────
var DB = {
  pekerja: JSON.parse(localStorage.getItem('tc-pekerja')||'[]'),
  absen:   JSON.parse(localStorage.getItem('tc-absen')||'[]')
};
var filterBln = null;

function save(){
  localStorage.setItem('tc-pekerja', JSON.stringify(DB.pekerja));
  localStorage.setItem('tc-absen',   JSON.stringify(DB.absen));
}

// ── INIT ─────────────────────────────────────────────────────────
(function init(){
  var today = new Date();
  var y = today.getFullYear();
  var m = String(today.getMonth()+1).padStart(2,'0');
  var d = String(today.getDate()).padStart(2,'0');
  document.getElementById('inp-tgl').value = y+'-'+m+'-'+d;
  autoHari();
  renderPekerja();
  renderSelect();
  renderRekap();
})();

// ── TABS ──────────────────────────────────────────────────────────
function goTab(id, btn){
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
  document.getElementById('pg-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='rekap') renderRekap();
}

// ── HARI ──────────────────────────────────────────────────────────
function autoHari(){
  var v = document.getElementById('inp-tgl').value;
  if(!v) return;
  var hari = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  document.getElementById('inp-hari').value = hari[new Date(v+'T00:00:00').getDay()];
}

function setNow(id){
  var n = new Date();
  document.getElementById(id).value = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

function fmtTgl(s){
  if(!s) return '–';
  var p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0];
}

function hitungJam(i,o){
  if(!i||!o) return '';
  var a=i.split(':').map(Number), b=o.split(':').map(Number);
  var mnt=(b[0]*60+b[1])-(a[0]*60+a[1]);
  if(mnt<=0) return '';
  return Math.floor(mnt/60)+'j'+(mnt%60?mnt%60+'m':'');
}

// ── PEKERJA ───────────────────────────────────────────────────────
function tambahPekerja(){
  var nama = document.getElementById('pek-nama').value.trim();
  var posisi = document.getElementById('pek-posisi').value.trim();
  if(!nama){toast('⚠️ Masukkan nama pekerja!');return;}
  if(DB.pekerja.find(function(p){return p.nama.toLowerCase()===nama.toLowerCase();})){
    toast('⚠️ Nama sudah ada!');return;
  }
  DB.pekerja.push({id:Date.now(), nama:nama, posisi:posisi});
  save();
  document.getElementById('pek-nama').value='';
  document.getElementById('pek-posisi').value='';
  renderPekerja();
  renderSelect();
  toast('✅ Pekerja ditambahkan!');
}

function hapusPekerja(id){
  if(!confirm('Hapus pekerja ini?')) return;
  DB.pekerja = DB.pekerja.filter(function(p){return p.id!==id;});
  save(); renderPekerja(); renderSelect();
  toast('🗑️ Pekerja dihapus');
}

function renderPekerja(){
  var el = document.getElementById('list-pekerja');
  if(!DB.pekerja.length){
    el.innerHTML='<div class="empty"><div class="ico">👥</div><p>Belum ada pekerja terdaftar</p></div>';
    return;
  }
  el.innerHTML = DB.pekerja.map(function(p){
    return '<div class="pek">'+
      '<div class="avatar">'+p.nama[0].toUpperCase()+'</div>'+
      '<div style="flex:1"><div style="font-weight:800;font-size:15px">'+p.nama+'</div>'+
      '<div style="font-size:12px;color:#aaa;font-weight:600">'+(p.posisi||'Pekerja Harian')+'</div></div>'+
      '<button class="btn-del" onclick="hapusPekerja('+p.id+')">🗑️ Hapus</button>'+
      '</div>';
  }).join('');
}

function renderSelect(){
  var sel = document.getElementById('inp-nama');
  var cur = sel.value;
  sel.innerHTML = '<option value="">– Pilih Pekerja –</option>'+
    DB.pekerja.map(function(p){return '<option value="'+p.nama+'">'+p.nama+'</option>';}).join('');
  if(cur) sel.value=cur;
}

// ── SIMPAN ABSEN ──────────────────────────────────────────────────
function simpan(){
  var tgl  = document.getElementById('inp-tgl').value;
  var hari = document.getElementById('inp-hari').value;
  var nama = document.getElementById('inp-nama').value;
  var inV  = document.getElementById('inp-in').value;
  var outV = document.getElementById('inp-out').value;
  var ket  = document.getElementById('inp-ket').value.trim();
  if(!tgl){toast('⚠️ Pilih tanggal!');return;}
  if(!nama){toast('⚠️ Pilih nama pekerja!');return;}
  if(!inV&&!outV){toast('⚠️ Isi jam masuk atau keluar!');return;}
  DB.absen.push({id:Date.now(), tanggal:tgl, hari:hari, nama:nama, inV:inV, outV:outV, ttd:hitungJam(inV,outV), ket:ket});
  save();
  document.getElementById('inp-in').value='';
  document.getElementById('inp-out').value='';
  document.getElementById('inp-ket').value='';
  toast('✅ Absen disimpan!');
}

// ── REKAP ────────────────────────────────────────────────────────
function renderRekap(){
  // build filter chips
  var blns = [];
  DB.absen.forEach(function(a){
    var b=a.tanggal.slice(0,7);
    if(blns.indexOf(b)<0) blns.push(b);
  });
  blns.sort().reverse();
  var chipsEl = document.getElementById('chips');
  chipsEl.innerHTML = '<div class="chip'+(filterBln===null?' on':'')+'" onclick="setFilter(null,this)">Semua</div>'+
    blns.map(function(b){
      var p=b.split('-');
      var bulan=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
      var lbl=bulan[parseInt(p[1])-1]+' '+p[0];
      return '<div class="chip'+(filterBln===b?' on':'')+'" onclick="setFilter(\''+b+'\',this)">'+lbl+'</div>';
    }).join('');

  // filter
  var list = DB.absen.filter(function(a){ return filterBln===null||a.tanggal.startsWith(filterBln); });
  list.sort(function(a,b){return b.tanggal.localeCompare(a.tanggal);});

  // summary
  var totalMnt=0;
  list.forEach(function(a){
    if(a.inV&&a.outV){
      var i=a.inV.split(':').map(Number), o=a.outV.split(':').map(Number);
      var d=(o[0]*60+o[1])-(i[0]*60+i[1]);
      if(d>0) totalMnt+=d;
    }
  });
  document.getElementById('s-catatan').textContent=list.length;
  var jj=Math.floor(totalMnt/60), mm=totalMnt%60;
  document.getElementById('s-jam').textContent=jj+(mm?'.'+mm:'')+'j';

  // list
  var el=document.getElementById('list-rekap');
  if(!list.length){
    el.innerHTML='<div class="empty"><div class="ico">📋</div><p>Belum ada data absen</p></div>';
    return;
  }
  el.innerHTML=list.map(function(a){
    return '<div class="rec">'+
      '<div class="rec-head">'+
        '<div>'+
          '<div class="rec-date">'+fmtTgl(a.tanggal)+'</div>'+
          '<div class="rec-day">'+a.hari+'</div>'+
          '<div class="rec-nama">👤 '+a.nama+'</div>'+
        '</div>'+
        '<span class="badge">'+(a.ttd||'Hadir')+'</span>'+
      '</div>'+
      '<div class="times">'+
        '<div class="tc"><div class="dot in"></div>IN: '+(a.inV||'–')+'</div>'+
        '<div class="tc"><div class="dot out"></div>OUT: '+(a.outV||'–')+'</div>'+
      '</div>'+
      (a.ket?'<div class="rec-ket">📝 '+a.ket+'</div>':'')+
      '<button class="rec-del" onclick="hapusAbsen('+a.id+')">🗑</button>'+
    '</div>';
  }).join('');
}

function setFilter(val, el){
  filterBln=val;
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});
  el.classList.add('on');
  renderRekap();
}

function hapusAbsen(id){
  if(!confirm('Hapus catatan ini?')) return;
  DB.absen=DB.absen.filter(function(a){return a.id!==id;});
  save(); renderRekap();
  toast('🗑️ Data dihapus');
}

// ── EXPORT ───────────────────────────────────────────────────────
function exportCSV(){
  if(!DB.absen.length){toast('⚠️ Belum ada data');return;}
  var csv='Tanggal,Hari,Nama,IN,OUT,Total Jam,Keterangan\n';
  var sorted=[].concat(DB.absen).sort(function(a,b){return a.tanggal.localeCompare(b.tanggal);});
  sorted.forEach(function(a){
    csv+='"'+fmtTgl(a.tanggal)+'","'+a.hari+'","'+a.nama+'","'+a.inV+'","'+a.outV+'","'+a.ttd+'","'+a.ket+'"\n';
  });
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var link=document.createElement('a');
  link.href=url; link.download='absen-pertanian.csv'; link.click();
  toast('✅ CSV diunduh!');
}

function exportTeks(){
  if(!DB.absen.length){toast('⚠️ Belum ada data');return;}
  var teks='DAFTAR HADIR TENAGA KERJA PERTANIAN\n'+'='.repeat(38)+'\n\n';
  var sorted=[].concat(DB.absen).sort(function(a,b){return a.tanggal.localeCompare(b.tanggal);});
  sorted.forEach(function(a){
    teks+=fmtTgl(a.tanggal)+' ('+a.hari+') | '+a.nama+'\n';
    teks+='  IN: '+(a.inV||'-')+'  OUT: '+(a.outV||'-')+'  Total: '+(a.ttd||'-')+'\n';
    if(a.ket) teks+='  Ket: '+a.ket+'\n';
    teks+='\n';
  });
  if(navigator.clipboard){
    navigator.clipboard.writeText(teks).then(function(){toast('✅ Teks disalin!');}).catch(function(){fallbackCopy(teks);});
  } else { fallbackCopy(teks); }
}
function fallbackCopy(teks){
  var ta=document.createElement('textarea');
  ta.value=teks; document.body.appendChild(ta);
  ta.select(); document.execCommand('copy');
  document.body.removeChild(ta);
  toast('✅ Teks disalin!');
}

// ── TOAST ────────────────────────────────────────────────────────
var toastTimer;
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.classList.remove('show');},2500);
}
</script>
</body>
</html>
